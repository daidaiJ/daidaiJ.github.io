name: GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 缓存 Hugo 模块
      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/hugo_cache
            ~/go/pkg/mod
          key: ${{ runner.os }}-hugo-modules-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-modules-

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.139.3'
          extended: true

      - name: Build
        working-directory: ./pandawo
        run: hugo --baseURL https://daidaij.github.io/ --minify

      # 图片优化
      - name: Optimize Images
        run: |
          sudo apt-get update
          sudo apt-get install -y optipng jpegoptim
          find ./pandawo/public -name "*.png" -exec optipng -o5 -quiet {} \; 2>/dev/null || true
          find ./pandawo/public -name "*.jpg" -exec jpegoptim --max=85 --quiet {} \; 2>/dev/null || true

      # 生成预压缩文件
      - name: Pre-compress files
        run: |
          find ./pandawo/public -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.xml" -o -name "*.json" -o -name "*.svg" \) ! -name "*.gz" ! -name "*.br" -exec gzip -k -9 {} \;
          find ./pandawo/public -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.xml" -o -name "*.json" -o -name "*.svg" \) ! -name "*.gz" ! -name "*.br" -exec brotli -k -9 {} \;

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          PERSONAL_TOKEN: ${{ secrets.ACTION_TOKEN }}
          PUBLISH_DIR: ./pandawo/public
          EXTERNAL_REPOSITORY: daidaiJ/daidaiJ.github.io